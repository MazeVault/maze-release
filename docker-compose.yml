# MazeVault — Customer Production Compose (HTTPS-first)
# ─────────────────────────────────────────────────────────
# Parametrized via .env — supports GHCR, Nexus, Harbor, offline load
#
# Quick start:
#   cp .env.example .env    # edit secrets
#   docker compose up -d
#
# Custom TLS: place server.crt + server.key in ./certs/
# ─────────────────────────────────────────────────────────

services:
  # ── TLS Certificate Init ─────────────────────────────────
  init-certs:
    image: ${IMAGE_REGISTRY:-ghcr.io/mazevault}/mazevault-init-certs:${IMAGE_TAG:-latest}
    volumes:
      - certs:/certs
      - ${CUSTOM_CERT_DIR:-./certs}:/custom-certs:ro
    environment:
      MAZEVAULT_TLS_SKIP_INIT: ${MAZEVAULT_TLS_SKIP_INIT:-false}
      MAZEVAULT_DOMAIN: ${MAZEVAULT_DOMAIN:-localhost}
    restart: "no"

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mazevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-mazevault}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mazevault}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (Go API) ────────────────────────────────────
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/mazevault}/mazevault-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      init-certs:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-mazevault}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mazevault}?sslmode=disable
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Secrets
      MAZEVAULT_JWT_KEY: ${JWT_SECRET:?JWT_SECRET required}
      MAZEVAULT_MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      MAZEVAULT_SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET required}
      # TLS
      MAZEVAULT_TLS_CERT_PATH: /certs
      # License Registration
      MAZEVAULT_CUSTOMER_NAME: ${MAZEVAULT_CUSTOMER_NAME:?MAZEVAULT_CUSTOMER_NAME required}
      MAZEVAULT_CUSTOMER_EMAIL: ${MAZEVAULT_CUSTOMER_EMAIL:?MAZEVAULT_CUSTOMER_EMAIL required}
      MAZEVAULT_COMPANY_ID: ${MAZEVAULT_COMPANY_ID:?MAZEVAULT_COMPANY_ID required}
      MAZEVAULT_INSTANCE_ID: ${MAZEVAULT_INSTANCE_ID:-}
      MAZEVAULT_REGION: ${MAZEVAULT_REGION:-EU}
      # Application
      MAZEVAULT_ENV: ${MAZEVAULT_ENV:-production}
      MAZEVAULT_ORCHESTRATOR_MODE: ${MAZEVAULT_ORCHESTRATOR_MODE:-false}
      APP_VERSION: ${APP_VERSION:-latest}
      PORT: ${PORT:-8443}
      GIN_MODE: ${GIN_MODE:-release}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      OCSP_URL: http://ocsp:8081
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # SMTP / Email Notifications
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Office365 OAuth2 Email (optional — takes priority over SMTP)
      O365_EMAIL_ENABLED: ${O365_EMAIL_ENABLED:-false}
      O365_TENANT_ID: ${O365_TENANT_ID:-}
      O365_CLIENT_ID: ${O365_CLIENT_ID:-}
      O365_CLIENT_SECRET: ${O365_CLIENT_SECRET:-}
      O365_SENDER_EMAIL: ${O365_SENDER_EMAIL:-}
      O365_AUTH_METHOD: ${O365_AUTH_METHOD:-client_secret}
      O365_CERTIFICATE_PATH: ${O365_CERTIFICATE_PATH:-}
      O365_CERTIFICATE_PASSWORD: ${O365_CERTIFICATE_PASSWORD:-}
      O365_MANAGED_IDENTITY_CLIENT_ID: ${O365_MANAGED_IDENTITY_CLIENT_ID:-}
      # Entra ID / SSO (optional)
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_REDIRECT_URI: ${ENTRA_REDIRECT_URI:-}
      MAZEVAULT_ENFORCE_OIDC_NONCE: ${MAZEVAULT_ENFORCE_OIDC_NONCE:-false}
      # Azure AD Token Validation (optional)
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      AZURE_AD_ALLOWED_TENANTS: ${AZURE_AD_ALLOWED_TENANTS:-}
      AZURE_AD_JWKS_CACHE_TTL: ${AZURE_AD_JWKS_CACHE_TTL:-86400}
      # Azure Managed Identity (optional)
      AZURE_MANAGED_IDENTITY_CLIENT_ID: ${AZURE_MANAGED_IDENTITY_CLIENT_ID:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_DEPLOYMENT: ${AZURE_DEPLOYMENT:-false}
      # License
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-https://mazevault-license-server-ezoz34eavq-ew.a.run.app}
      BUILD_AUTH_SECRET: ${BUILD_AUTH_SECRET:-}
      ENABLE_LICENSE_CHECK: ${ENABLE_LICENSE_CHECK:-true}
      # Agent Binary Proxy (optional)
      AGENT_BINARY_GITHUB_TOKEN: ${AGENT_BINARY_GITHUB_TOKEN:-}
      AGENT_BINARY_CACHE_DIR: ${AGENT_BINARY_CACHE_DIR:-/data/agent-binaries}
      AGENT_BINARY_RELEASE_API_URL: ${AGENT_BINARY_RELEASE_API_URL:-}
      AGENT_ROLLOUT_PERCENTAGE: ${AGENT_ROLLOUT_PERCENTAGE:-100}
      AGENT_MAX_CONCURRENT_DOWNLOADS: ${AGENT_MAX_CONCURRENT_DOWNLOADS:-10}
      AGENT_DOWNLOAD_BASE_URL: ${AGENT_DOWNLOAD_BASE_URL:-}
      AGENT_VERSION: ${AGENT_VERSION:-latest}
      # Public backend URL (fallback for agent self-update links when Origin/Host is not propagated)
      MAZEVAULT_SERVER_URL: ${MAZEVAULT_SERVER_URL:-}
      # Gateway Mode (optional — multi-DC satellite)
      MAZEVAULT_MODE: ${MAZEVAULT_MODE:-primary}
      PRIMARY_BACKEND_URL: ${PRIMARY_BACKEND_URL:-}
      GATEWAY_BOOTSTRAP_TOKEN: ${GATEWAY_BOOTSTRAP_TOKEN:-}
      GATEWAY_NAME: ${GATEWAY_NAME:-}
      MAZEVAULT_GATEWAY_ENVIRONMENT: ${MAZEVAULT_GATEWAY_ENVIRONMENT:-}
      MAZEVAULT_GATEWAY_ENVIRONMENTS: ${MAZEVAULT_GATEWAY_ENVIRONMENTS:-}
      MAZEVAULT_GATEWAY_ROLE: ${MAZEVAULT_GATEWAY_ROLE:-primary}
      MAZEVAULT_GATEWAY_STATE_FILE: ${MAZEVAULT_GATEWAY_STATE_FILE:-/etc/mazevault/gateway-state.json}
      MAZEVAULT_VERSION: ${MAZEVAULT_VERSION:-latest}
      # Primary backend environments (seeds local gateway on first startup)
      MAZEVAULT_PRIMARY_ENVIRONMENTS: ${MAZEVAULT_PRIMARY_ENVIRONMENTS:-}
      # Canonical Environment Identifier Enforcement
      MAZEVAULT_ENV_CANONICAL_ENFORCE: ${MAZEVAULT_ENV_CANONICAL_ENFORCE:-false}
      # ACME DNS-01 (optional — for wildcard certificate validation)
      MAZEVAULT_ACME_DNS_PROVIDER: ${MAZEVAULT_ACME_DNS_PROVIDER:-none}
      MAZEVAULT_ACME_DNS_API_TOKEN: ${MAZEVAULT_ACME_DNS_API_TOKEN:-}
      # KeyTab Management (optional)
      MAZEVAULT_KEYTAB_ENABLED: ${MAZEVAULT_KEYTAB_ENABLED:-true}
      MAZEVAULT_KEYTAB_MAX_SIZE_MB: ${MAZEVAULT_KEYTAB_MAX_SIZE_MB:-10}
      MAZEVAULT_KEYTAB_DEFAULT_EXPIRY_DAYS: ${MAZEVAULT_KEYTAB_DEFAULT_EXPIRY_DAYS:-365}
    volumes:
      - certs:/certs:ro
      - backend_data:/app/data
    ports:
      - "${BACKEND_PORT:-8443}:8443"
    networks:
      - internal
      - frontend
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT:-1g}

  # ── OCSP Responder ───────────────────────────────────────
  ocsp:
    image: ${IMAGE_REGISTRY:-ghcr.io/mazevault}/mazevault-ocsp:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_CONNECTION: postgres://${POSTGRES_USER:-mazevault}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mazevault}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MAZEVAULT_MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      MAZEVAULT_TLS_CERT_PATH: /certs
      SERVER_PORT: 8081
    volumes:
      - certs:/certs:ro
    ports:
      - "${OCSP_PORT:-8081}:8081"
    networks:
      - internal
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Documentation ────────────────────────────────────────
  docs:
    image: ${IMAGE_REGISTRY:-ghcr.io/mazevault}/mazevault-docs:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      init-certs:
        condition: service_completed_successfully
    volumes:
      - certs:/etc/nginx/certs:ro
    ports:
      - "${DOCS_PORT:-8088}:443"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost:443"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (nginx + React) ─────────────────────────────
  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/mazevault}/mazevault-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      init-certs:
        condition: service_completed_successfully
      backend:
        condition: service_started
    environment:
      - BACKEND_HOST=backend
      - MAZEVAULT_DOMAIN=${MAZEVAULT_DOMAIN:-localhost}
      - MAZEVAULT_ORCHESTRATOR_MODE=${MAZEVAULT_ORCHESTRATOR_MODE:-false}
    volumes:
      - certs:/etc/nginx/certs:ro
    ports:
      - "${FRONTEND_PORT:-443}:443"
      - "${FRONTEND_HTTP_PORT:-80}:80"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEMORY_LIMIT:-256m}

volumes:
  certs:
    driver: local
  pgdata:
    driver: local
  backend_data:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true   # No external access
  frontend:
    driver: bridge
